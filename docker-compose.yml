services:
  postgres:
    image: postgres:16-alpine
    container_name: memocards-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: memocards
      POSTGRES_PASSWORD: memocards
      POSTGRES_DB: memocards
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memocards -d memocards"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
